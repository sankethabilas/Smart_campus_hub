spring:
  application:
    name: smart_campus_Operation-hub
  datasource:
    url: jdbc:mysql://localhost:3306/campus?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true
  jwt:
    secret: ${JWT_SECRET}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
logging:
  level:
    org.springframework.security: DEBUG
server:
  port: 8081

