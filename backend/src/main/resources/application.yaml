spring:
  application:
    name: smart_campus_Operation-hub
  datasource:
    url: jdbc:mysql://localhost:3306/campus?createDatabaseIfNotExist=true
    username: root
    password: "123456"
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true
  jwt:
    secret: ${JWT_SECRET:SmartCampusOperationHub_SuperSecretJwtKey_2026_ChangeInProduction!}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - email
              - profile
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true
logging:
  level:
    org.springframework.security: DEBUG
server:
  port: 8081
file:
  upload-dir: uploads
