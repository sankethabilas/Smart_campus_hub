spring:
  application:
    name: smart_campus_Operation-hub
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Abi0021@}
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true
  jwt:
    secret: my-secret-jwt-key-12345-for-development
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile
logging:
  level:
    org.springframework.security: DEBUG
server:
  port: 8083
